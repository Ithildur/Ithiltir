name: release

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      node_version:
        description: Ithiltir-node release tag to bundle; empty uses latest compatible tag, falling back from prerelease to release when needed
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: web/.bun-version

      - name: Install Frontend Dependencies
        run: cd web && bun install --frozen-lockfile

      - name: Go Test
        run: go test ./...

      - name: Frontend Lint
        run: cd web && bun run lint

      - name: Frontend Typecheck
        run: cd web && bun run typecheck

      - name: Resolve Release Channel
        id: release_channel
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME:-}"
          if [[ "${GITHUB_REF_TYPE:-}" != "tag" || -z "$tag" ]]; then
            tags="$(git tag --points-at HEAD | sed '/^$/d' || true)"
            count="$(printf '%s\n' "$tags" | sed '/^$/d' | wc -l | tr -d ' ')"
            if [[ "$count" != "1" ]]; then
              echo "current commit must have exactly one git tag" >&2
              if [[ -n "$tags" ]]; then
                printf '%s\n' "$tags" >&2
              fi
              exit 1
            fi
            tag="$tags"
          fi

          channel="$(go run ./cmd/releasever channel "$tag")"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if [[ "$channel" == "prerelease" ]]; then
            echo "channel=prerelease" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "channel=release" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package
        env:
          ITHILTIR_NODE_VERSION: ${{ github.event.inputs.node_version || vars.ITHILTIR_NODE_VERSION }}
        shell: bash
        run: |
          node_args=()
          if [[ -n "${ITHILTIR_NODE_VERSION:-}" ]]; then
            node_args=(--node-version "$ITHILTIR_NODE_VERSION")
          fi
          bash scripts/package.sh --use-git-tag --release "${node_args[@]}" -o release -t linux/amd64,linux/arm64 --tar-gz

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ithiltir-package-release
          path: release/*.tar.gz
          if-no-files-found: error

      - name: Build Release Notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          if [[ "${{ steps.release_channel.outputs.prerelease }}" == "true" ]]; then
            scripts/release_notes.sh --default-base "${{ steps.release_channel.outputs.tag }}" release-notes.md
          else
            scripts/release_notes.sh "${{ steps.release_channel.outputs.tag }}" release-notes.md
          fi

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz
          prerelease: ${{ steps.release_channel.outputs.prerelease == 'true' }}
          body_path: release-notes.md
